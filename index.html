<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BlackzinXiter</title>

<style>

body{
background:#0b0014;
font-family:Arial;
color:white;
text-align:center;
padding-top:40px;
}

.logo{
font-size:32px;
font-weight:bold;
color:#bb00ff;
text-shadow:0 0 15px #bb00ff;
margin-bottom:30px;
}

.panel{
background:#120022;
width:85%;
margin:auto;
padding:25px;
border-radius:20px;
box-shadow:0 0 25px #7a00ff;
}

input{
width:75%;
padding:15px;
margin-top:10px;
border-radius:12px;
border:none;
background:#1a0033;
color:white;
font-size:16px;
text-align:center;
box-shadow:0 0 10px #7a00ff inset;
}

button{
width:80%;
padding:15px;
margin:15px;
border:none;
border-radius:12px;
font-size:18px;
background:#7a00ff;
color:white;
box-shadow:0 0 15px #7a00ff;
}

button:active{
transform:scale(0.95);
}

.result{
margin-top:20px;
font-size:18px;
color:#d38cff;
}

.loader{
border:5px solid #2c004d;
border-top:5px solid #bb00ff;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
margin:auto;
margin-top:15px;
display:none;
}

.perfil{
display:none;
background:#1a0033;
padding:10px;
margin-bottom:20px;
border-radius:15px;
box-shadow:0 0 15px #7a00ff;
}

.error{
color:#ff4d6d;
margin-top:10px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>

</head>

<body>

<div class="logo">
BLACKZIN XITER
</div>

<div class="perfil" id="perfilBanner">
<span id="userName"></span> |
<span id="userDays"></span>
</div>

<div class="panel" id="loginPanel">

<h3>INSIRA SUA KEY</h3>

<input id="keyInput" placeholder="BLACKZIN-XXXXX">

<br>

<button onclick="checkKey()">ATIVAR</button>

<div id="keyError" class="error"></div>

</div>

<div class="panel" id="mainPanel" style="display:none">

<button onclick="testPing()">TESTAR PING</button>

<div id="pingLoader" class="loader"></div>
<div id="pingResult" class="result"></div>

<button onclick="optimize()">OTIMIZAR REDE</button>

<div id="optLoader" class="loader"></div>
<div id="optResult" class="result"></div>

</div>

<script>

async function checkKey(){

let key=document.getElementById("keyInput").value

try{

let response = await fetch("keys.json")
let data = await response.json()

let user = data.users.find(u => u.key === key)

if(user){

document.getElementById("loginPanel").style.display="none"
document.getElementById("mainPanel").style.display="block"
document.getElementById("perfilBanner").style.display="block"

document.getElementById("userName").innerHTML="👤 "+user.name
document.getElementById("userDays").innerHTML="⏳ "+user.days+" dias restantes"

}else{

document.getElementById("keyError").innerHTML="KEY NÃO ENCONTRADA"

}

}catch(e){

document.getElementById("keyError").innerHTML="Erro ao verificar key"

}

}

function testPing(){

document.getElementById("pingLoader").style.display="block";
document.getElementById("pingResult").innerHTML="Testando conexão...";

setTimeout(function(){

let ping=Math.floor(Math.random()*30)+20;

document.getElementById("pingLoader").style.display="none";
document.getElementById("pingResult").innerHTML="Ping estabilizado: "+ping+" ms";

},2000)

}

function optimize(){

document.getElementById("optLoader").style.display="block";
document.getElementById("optResult").innerHTML="Otimizando rota...";

setTimeout(function(){

document.getElementById("optLoader").style.display="none";
document.getElementById("optResult").innerHTML="Rota otimizada com sucesso";

},2500)

}

</script>

</body>
</html>
